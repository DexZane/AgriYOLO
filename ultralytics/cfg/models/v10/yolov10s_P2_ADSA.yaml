# YOLOv10s + P2 + BiFPN + ADSA (Asymmetric Depth Strategy Allocation)
# Stage 3: 添加非对称深度分配策略 (ADSA)
# 配置: 浅层(P2/P3)使用2个DSConv块，深层(P4/P5)使用1个
nc: 27
scales:
  s: [0.33, 0.50, 1024]

backbone:
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 3, C2f, [128, True]] # 2
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 6, C2f, [256, True]] # 4
  - [-1, 1, SCDown, [512, 3, 2]] # 5-P4/16
  - [-1, 6, C2f, [512, True]] # 6
  - [-1, 1, SCDown, [1024, 3, 2]] # 7-P5/32
  - [-1, 3, C2fCIB, [1024, True, True]] # 8
  - [-1, 1, SPPF, [1024, 5]] # 9
  - [-1, 1, PSA, [1024]] # 10

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 11
  - [[-1, 6], 1, Concat, [1]] # 12 cat P4
  - [-1, 3, C2f, [512]] # 13

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 14
  - [[-1, 4], 1, Concat, [1]] # 15 cat P3
  - [-1, 3, C2f, [256]] # 16

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 17
  - [[-1, 2], 1, Concat, [1]] # 18 cat P2
  - [-1, 3, C2f, [128]] # 19 (P2 head)

  # BiFPN Integration with ADSA
  # 配置: heavy_levels=2 (P2/P3使用2个块), heavy_repeats=2, light_repeats=1
  # Inputs: P2(19), P3(16), P4(13), P5(10)
  - [[19, 16, 13, 10], 1, DynamicWeightedBiFPN, [128, 2, 2, 1, false, true, false, 4]] # 20: [P2, P3, P4, P5]

  - [20, 1, FeatureSelect, [0]] # 21 P2
  - [20, 1, FeatureSelect, [1]] # 22 P3
  - [20, 1, FeatureSelect, [2]] # 23 P4
  - [20, 1, FeatureSelect, [3]] # 24 P5

  - [[21, 22, 23, 24], 1, v10Detect, [nc]] # Detect(P2, P3, P4, P5)
